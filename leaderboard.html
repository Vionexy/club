<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Таблица лидеров</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header__inner">
      <div>
        <h1 class="header__title">🥇 Зал Славы</h1>
        <p class="header__subtitle">Топ игроков Deadly Crew</p>
      </div>
      <div id="admin-indicator" class="badge badge--draft hidden">Admin</div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container page animate-fade-in" style="padding-bottom:100px">
    
    <!-- Top 3 Podium -->
    <div id="podium-container" class="podium hidden">
      <!-- Silver (2nd) -->
      <div class="podium__item podium__item--silver">
        <div id="podium-avatar-2" class="podium__avatar">🥈</div>
        <div id="podium-name-2" class="podium__name">Ожидание</div>
        <div id="podium-bar-2" class="podium__bar">2</div>
      </div>
      <!-- Gold (1st) -->
      <div class="podium__item podium__item--gold">
        <div id="podium-avatar-1" class="podium__avatar">🥇</div>
        <div id="podium-name-1" class="podium__name">Ожидание</div>
        <div id="podium-bar-1" class="podium__bar">1</div>
      </div>
      <!-- Bronze (3rd) -->
      <div class="podium__item podium__item--bronze">
        <div id="podium-avatar-3" class="podium__avatar">🥉</div>
        <div id="podium-name-3" class="podium__name">Ожидание</div>
        <div id="podium-bar-3" class="podium__bar">3</div>
      </div>
    </div>

    <!-- Leaderboard List -->
    <div class="detail-section">
      <h3 class="detail-section__title">⚔️ Рейтинг участников</h3>
      <div id="leaderboard-list" class="leaderboard-list">
        <!-- Loading rows will be inserted here -->
      </div>
    </div>

  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="bottom-nav__inner">
      <a href="index.html" class="bottom-nav__item" data-nav="tournaments">
        <svg viewBox="0 0 24 24">
          <path d="M19 5h-2V3c0-1.1-.9-2-2-2H9c-1.1 0-2 .9-2 2v2H5c-1.1 0-2 .9-2 2v13c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-6-2h2v2h-2V3zm-4 0h2v2H9V3zm10 17H5V7h14v13z"/>
        </svg>
        <span>Турниры</span>
      </a>
      <a href="leaderboard.html" class="bottom-nav__item bottom-nav__item--active" data-nav="leaderboard">
        <svg viewBox="0 0 24 24">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
        <span>Лидеры</span>
      </a>
      <a href="history.html" class="bottom-nav__item" data-nav="history">
        <svg viewBox="0 0 24 24">
          <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
        </svg>
        <span>История</span>
      </a>
      <a href="profile.html" class="bottom-nav__item" data-nav="profile">
        <svg viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
        <span>Профиль</span>
      </a>
    </div>
  </nav>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- App JS -->
  <script src="js/telegram.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      App.init({ page: 'leaderboard', activeNav: 'leaderboard' });

      const listContainer = document.getElementById('leaderboard-list');
      const podiumContainer = document.getElementById('podium-container');
      App.showSkeletons(listContainer, 4, 'row');

      try {
        // Check admin
        try {
          const adminCheck = await API.checkAdmin();
          if (adminCheck && adminCheck.is_admin) {
            const ind = document.getElementById('admin-indicator');
            ind.classList.remove('hidden');
            ind.addEventListener('click', () => {
              App.navigate('admin/index.html');
            });
          }
        } catch (e) {}

        const me = await API.getMe();
        const leaderboard = await API.getLeaderboard(50);
        listContainer.innerHTML = '';

        if (leaderboard.length === 0) {
          App.showEmpty(
            listContainer,
            '🥇',
            'Таблица пуста',
            'Сыграйте в первом турнире, чтобы заработать очки!'
          );
          return;
        }

        // Setup Podium (top 3)
        const top1 = leaderboard[0];
        const top2 = leaderboard[1];
        const top3 = leaderboard[2];

        if (top1) {
          document.getElementById('podium-name-1').textContent = top1.display_name;
          document.getElementById('podium-bar-1').textContent = `${top1.wins} W`;
          document.getElementById('podium-avatar-1').textContent = top1.display_name[0].toUpperCase();
        }
        if (top2) {
          document.getElementById('podium-name-2').textContent = top2.display_name;
          document.getElementById('podium-bar-2').textContent = `${top2.wins} W`;
          document.getElementById('podium-avatar-2').textContent = top2.display_name[0].toUpperCase();
        }
        if (top3) {
          document.getElementById('podium-name-3').textContent = top3.display_name;
          document.getElementById('podium-bar-3').textContent = `${top3.wins} W`;
          document.getElementById('podium-avatar-3').textContent = top3.display_name[0].toUpperCase();
        }

        podiumContainer.classList.remove('hidden');

        // Render list (all players including top 3 for completeness, or starting from 4th)
        leaderboard.forEach((player, index) => {
          const rank = index + 1;
          const row = document.createElement('div');
          row.className = 'leaderboard-row animate-slide-up';
          if (player.id === me.id) {
            row.classList.add('leaderboard-row--me');
          }

          let rankBadge = rank;
          if (rank === 1) rankBadge = '🥇';
          else if (rank === 2) rankBadge = '🥈';
          else if (rank === 3) rankBadge = '🥉';

          row.innerHTML = `
            <div class="leaderboard-row__rank">${rankBadge}</div>
            <div class="leaderboard-row__avatar">${player.display_name[0].toUpperCase()}</div>
            <div class="leaderboard-row__name">
              ${App.escapeHtml(player.display_name)}
              ${player.brawl_stars_tag ? `<small style="display:block;color:var(--text-muted)">#${App.escapeHtml(player.brawl_stars_tag)}</small>` : ''}
            </div>
            <div class="leaderboard-row__wins">${player.wins} W</div>`;
          listContainer.appendChild(row);
        });

      } catch (err) {
        App.showError(listContainer, err.message, () => window.location.reload());
      }
    });
  </script>
</body>
</html>
