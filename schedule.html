<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Расписание — Deadly Crew</title>
  <link rel="stylesheet" href="css/style.css?v=1781715247">
  <style>
    /* Horizontal Date Selector */
    .date-slider {
      display: flex;
      gap: var(--space-sm);
      overflow-x: auto;
      padding: var(--space-sm) 0 var(--space-md);
      margin-bottom: var(--space-lg);
      scrollbar-width: none; /* Firefox */
    }
    .date-slider::-webkit-scrollbar {
      display: none; /* Safari & Chrome */
    }
    .date-item {
      flex: 0 0 60px;
      height: 75px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .date-item:hover {
      border-color: var(--border-hover);
    }
    .date-item--active {
      background: var(--accent-orange-glow);
      border-color: var(--accent-orange);
      box-shadow: 0 0 10px var(--accent-orange-glow);
    }
    .date-item__weekday {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .date-item__day {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      color: var(--text-primary);
    }
    .date-item--active .date-item__weekday {
      color: var(--accent-orange);
    }
    .date-item--active .date-item__day {
      color: var(--accent-orange);
    }
    .date-item--all {
      flex: 0 0 auto;
      padding: 0 var(--space-md);
    }
    .date-item--all span {
      font-size: var(--text-xs);
      font-weight: bold;
    }
    
    /* Live registration indicator */
    .prac-meta {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      margin: var(--space-md) 0;
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }
    .prac-time {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--accent-cyan);
      font-weight: 500;
    }
    
    .schedule-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-md);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header__inner">
      <button class="header__back" onclick="window.history.back()">←</button>
      <h1 class="header__title">📅 Расписание</h1>
      <div style="width:36px"></div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container page animate-fade-in" style="padding-bottom:100px">
    
    <div class="schedule-header">
      <div class="page-title" style="margin-bottom:0">
        <span>📅</span> Календарь праков
      </div>
      <input type="date" id="native-datepicker" style="background:var(--bg-secondary); color:var(--text-primary); border:1px solid var(--border-default); border-radius:var(--radius-sm); padding:4px 8px; font-size:var(--text-xs); outline:none; cursor:pointer;">
    </div>

    <!-- Date Slider -->
    <div class="date-slider" id="date-slider-container">
      <!-- Generated days will be inserted here -->
    </div>

    <div class="page-title">
      <span>⚔️</span> Игры на выбранную дату
    </div>

    <!-- Tournaments List -->
    <div id="tournaments-list" class="stagger-children">
      <!-- Loading skeletons or tournaments will be inserted here -->
    </div>

  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="bottom-nav__inner">
      <a href="index.html" class="bottom-nav__item" data-nav="home">
        <svg viewBox="0 0 24 24">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span>Главная</span>
      </a>
      <a href="schedule.html" class="bottom-nav__item bottom-nav__item--active" data-nav="schedule">
        <svg viewBox="0 0 24 24">
          <path d="M19 5h-2V3c0-1.1-.9-2-2-2H9c-1.1 0-2 .9-2 2v2H5c-1.1 0-2 .9-2 2v13c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-6-2h2v2h-2V3zm-4 0h2v2H9V3zm10 17H5V7h14v13z"/>
        </svg>
        <span>Расписание</span>
      </a>
      <a href="leaderboard.html" class="bottom-nav__item" data-nav="leaderboard">
        <svg viewBox="0 0 24 24">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
        <span>Лидеры</span>
      </a>
      <a href="profile.html" class="bottom-nav__item" data-nav="profile">
        <svg viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
        <span>Профиль</span>
      </a>
    </div>
  </nav>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- App JS -->
  <script src="js/telegram.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      App.init({ page: 'schedule', activeNav: 'schedule', showBack: true, backUrl: 'index.html' });

      const listContainer = document.getElementById('tournaments-list');
      const dateSlider = document.getElementById('date-slider-container');
      const nativePicker = document.getElementById('native-datepicker');
      
      let allTournaments = [];
      let selectedDateStr = 'all'; // 'all' or 'YYYY-MM-DD'
      
      // Initialize week slider
      const weekdays = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
      
      const renderSlider = (activeDateStr) => {
        dateSlider.innerHTML = '';
        
        // "All" button
        const allItem = document.createElement('div');
        allItem.className = `date-item date-item--all ${activeDateStr === 'all' ? 'date-item--active' : ''}`;
        allItem.innerHTML = `
          <div class="date-item__weekday">Игры</div>
          <div class="date-item__day">Все</div>`;
        allItem.addEventListener('click', () => {
          selectedDateStr = 'all';
          nativePicker.value = '';
          renderSlider('all');
          filterAndRender();
        });
        dateSlider.appendChild(allItem);

        // Next 7 days starting from today
        const today = new Date();
        for (let i = 0; i < 7; i++) {
          const d = new Date(today);
          d.setDate(today.getDate() + i);
          
          const yyyy = d.getFullYear();
          const mm = String(d.getMonth() + 1).padStart(2, '0');
          const dd = String(d.getDate()).padStart(2, '0');
          const fullDateStr = `${yyyy}-${mm}-${dd}`;
          
          const activeClass = activeDateStr === fullDateStr ? 'date-item--active' : '';
          const dayName = weekdays[d.getDay()];
          const dayNum = d.getDate();
          
          const dateItem = document.createElement('div');
          dateItem.className = `date-item ${activeClass}`;
          dateItem.innerHTML = `
            <div class="date-item__weekday">${dayName}</div>
            <div class="date-item__day">${dayNum}</div>`;
            
          dateItem.addEventListener('click', () => {
            selectedDateStr = fullDateStr;
            nativePicker.value = fullDateStr;
            renderSlider(fullDateStr);
            filterAndRender();
          });
          dateSlider.appendChild(dateItem);
        }
      };

      // Native Date picker handler
      nativePicker.addEventListener('change', (e) => {
        if (e.target.value) {
          selectedDateStr = e.target.value;
          renderSlider(selectedDateStr);
          filterAndRender();
        }
      });

      const filterAndRender = () => {
        listContainer.innerHTML = '';
        
        let filtered = allTournaments;
        if (selectedDateStr !== 'all') {
          filtered = allTournaments.filter(t => {
            if (!t.start_date) return false;
            const tDate = t.start_date.split('T')[0];
            return tDate === selectedDateStr;
          });
        } else {
          // If "All" selected, only show active/upcoming (exclude completed)
          filtered = allTournaments.filter(t => t.status !== 'completed');
        }

        if (filtered.length === 0) {
          const dateDesc = selectedDateStr === 'all' 
            ? 'Следите за новостями клуба, скоро начнется новый турнир!' 
            : `На выбранную дату (${App.formatDate(selectedDateStr)}) праки не запланированы.`;
          
          App.showEmpty(
            listContainer,
            '📅',
            'Праков не найдено',
            dateDesc
          );
          return;
        }

        filtered.forEach(t => {
          const card = document.createElement('div');
          card.className = 'card tournament-card animate-slide-up';
          card.addEventListener('click', () => {
            App.navigate('tournament.html', { id: t.id });
          });

          const isRegBadge = t.is_registered ? `<span class="badge badge--registration">✓ Вы участвуете</span>` : '';
          const bannerImg = t.image_id ? `<img src="${API.BASE_URL}/tournaments/${t.id}/image" alt="banner" style="width:100%; height:120px; object-fit:cover; border-radius:var(--radius-md); margin-bottom:var(--space-md);">` : '';
          
          card.innerHTML = `
            ${bannerImg}
            <div class="tournament-card__header">
              <h3 class="tournament-card__title">${App.escapeHtml(t.title)}</h3>
              ${App.statusBadge(t.status)}
            </div>
            
            <div class="prac-meta">
              <div class="prac-time">
                <span>🕒</span> Начало: ${App.formatDateTime(t.start_date)}
              </div>
              <div class="text-sm">
                <span>🎮</span> Режим: <b>${App.escapeHtml(t.game_mode)}</b> (${t.tournament_type})
              </div>
            </div>

            <p class="tournament-card__desc">${App.escapeHtml(t.description || 'Описание отсутствует.')}</p>
            <div class="tournament-card__meta">
              ${isRegBadge}
            </div>
            <div class="tournament-card__footer" style="margin-top:var(--space-md)">
              <span class="tournament-card__players">
                <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                ${t.participant_count} / ${t.max_participants} участников
              </span>
              <button class="btn btn--primary btn--sm">Подробнее</button>
            </div>`;
          listContainer.appendChild(card);
        });
      };

      const loadSchedule = async () => {
        App.showSkeletons(listContainer, 3);
        try {
          // Fetch tournaments
          allTournaments = await API.getTournaments();
          filterAndRender();
        } catch (err) {
          App.showError(listContainer, err.message, loadSchedule);
        }
      };

      renderSlider('all');
      await loadSchedule();
    });
  </script>
</body>
</html>
