<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Управление турниром</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header__inner">
      <button class="header__back" onclick="App.navigate('index.html')">←</button>
      <h1 class="header__title">⚙️ Управление</h1>
      <div style="width:36px"></div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container page animate-fade-in" style="max-width:100%; padding-left:0; padding-right:0; padding-bottom:120px">
    
    <div class="px-lg">
      <div class="card mb-lg">
        <h2 id="tournament-title" class="font-display mb-sm" style="font-size:var(--text-lg)">—</h2>
        <div class="flex justify-between items-center mt-md">
          <div id="tournament-status-badge"></div>
          <span class="text-muted text-sm">Участники: <strong id="tournament-players-count" style="color:var(--text-primary)">—</strong></span>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex flex-col gap-sm mb-xl">
        <button id="generate-bracket-btn" class="btn btn--primary btn--full hidden">📊 Сгенерировать сетку</button>
        <button id="notify-bracket-btn" class="btn btn--success btn--full hidden">📢 Оповестить о сетке</button>
        <button id="delete-tournament-btn" class="btn btn--danger btn--full btn--sm">🗑️ Удалить турнир</button>
      </div>

      <div class="page-title" style="margin-bottom:0">
        <span>⚔️</span> Управление матчами
      </div>
      <p class="text-muted text-xs mt-sm">Нажмите на любой активный матч в сетке, чтобы внести счет и выбрать победителя.</p>
    </div>

    <!-- Bracket Container -->
    <div id="manage-bracket-container" class="bracket-container">
      <!-- Interactive bracket -->
    </div>

  </main>

  <!-- Winner and Score Edit Modal Sheet -->
  <div id="modal-overlay" class="modal-overlay">
    <div id="match-modal" class="modal">
      <div class="modal__handle"></div>
      <h3 class="modal__title">Результат матча</h3>
      
      <p class="text-muted text-sm mb-lg">Выберите победителя и укажите счет игры:</p>

      <div class="form-group">
        <label class="form-label">Победитель</label>
        <div class="match-edit__players">
          <div id="match-player1-btn" class="match-edit__player">Игрок 1</div>
          <div class="match-edit__vs">vs</div>
          <div id="match-player2-btn" class="match-edit__player">Игрок 2</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Итоговый счет</label>
        <div class="match-edit__score">
          <input type="number" id="match-score1" value="0" min="0">
          <span style="font-weight:700">:</span>
          <input type="number" id="match-score2" value="0" min="0">
        </div>
      </div>

      <div class="flex gap-md mt-xl">
        <button id="modal-close" class="btn btn--secondary" style="flex:1">Отмена</button>
        <button id="match-save-btn" class="btn btn--primary" style="flex:2">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- App JS -->
  <script src="../js/telegram.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/bracket.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      API.BASE_URL = 'http://localhost:8000/api';
      App.init({ page: 'admin-manage', showBack: true, backUrl: 'index.html' });

      // Run Admin Panel Manage Page Initializer
      Admin.initManagePage();
    });
  </script>
</body>
</html>
