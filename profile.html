<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мой профиль</title>
  <link rel="stylesheet" href="css/style.css?v=1781715247">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header__inner">
      <div>
        <h1 class="header__title">👤 Личный кабинет</h1>
        <p class="header__subtitle">Ваш игровой профиль</p>
      </div>
      <div id="admin-indicator" class="badge badge--draft hidden">Admin</div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container page animate-fade-in" style="padding-bottom:100px">
    
    <!-- Profile Info Card -->
    <div class="profile-header">
      <div id="profile-avatar" class="profile-avatar">?</div>
      <h2 id="profile-name" class="profile-name">—</h2>
      <p id="profile-username" class="profile-username">@—</p>
    </div>

    <!-- Edit Profile Card -->
    <div class="card mb-lg">
      <h3 class="font-display mb-md" style="font-size:var(--text-lg)">⚔️ Настройки Brawl Stars</h3>
      <form id="profile-form">
        <div class="form-group">
          <label class="form-label" for="brawl-tag">Brawl Stars Tag</label>
          <div class="tag-input-wrapper">
            <input type="text" id="brawl-tag" class="form-input" placeholder="YV8L0G" required maxlength="15">
          </div>
          <p class="text-muted text-xs mt-sm">Ваш уникальный тег игрока без знака #. Он необходим для регистрации в турнирах.</p>
        </div>

        <div class="form-group">
          <label class="form-label" for="display-name-input">Имя в турнирах</label>
          <input type="text" id="display-name-input" class="form-input" required maxlength="50">
        </div>

        <button type="submit" id="save-profile-btn" class="btn btn--primary btn--full">Сохранить изменения</button>
      </form>
    </div>

    <!-- Quick Stats -->
    <div class="detail-section">
      <h3 class="detail-section__title">📊 Ваша статистика</h3>
      <div class="profile-stats">
        <div class="profile-stat">
          <div id="stat-tournaments" class="profile-stat__value">—</div>
          <div class="profile-stat__label">Турниры</div>
        </div>
        <div class="profile-stat">
          <div id="stat-wins" class="profile-stat__value">—</div>
          <div class="profile-stat__label">Победы</div>
        </div>
        <div class="profile-stat">
          <div id="stat-status" class="profile-stat__value" style="font-size:var(--text-lg); margin-top:8px">Игрок</div>
          <div class="profile-stat__label">Роль</div>
        </div>
      </div>
    </div>

  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="bottom-nav__inner">
      <a href="index.html" class="bottom-nav__item" data-nav="home">
        <svg viewBox="0 0 24 24">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span>Главная</span>
      </a>
      <a href="schedule.html" class="bottom-nav__item" data-nav="schedule">
        <svg viewBox="0 0 24 24">
          <path d="M19 5h-2V3c0-1.1-.9-2-2-2H9c-1.1 0-2 .9-2 2v2H5c-1.1 0-2 .9-2 2v13c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-6-2h2v2h-2V3zm-4 0h2v2H9V3zm10 17H5V7h14v13z"/>
        </svg>
        <span>Расписание</span>
      </a>
      <a href="leaderboard.html" class="bottom-nav__item" data-nav="leaderboard">
        <svg viewBox="0 0 24 24">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
        <span>Лидеры</span>
      </a>
      <a href="profile.html" class="bottom-nav__item bottom-nav__item--active" data-nav="profile">
        <svg viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
        <span>Профиль</span>
      </a>
    </div>
  </nav>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- App JS -->
  <script src="js/telegram.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      App.init({ page: 'profile', activeNav: 'profile' });

      const form = document.getElementById('profile-form');
      const tagInput = document.getElementById('brawl-tag');
      const nameInput = document.getElementById('display-name-input');
      const avatarEl = document.getElementById('profile-avatar');

      let user = null;

      const loadProfile = async () => {
        try {
          user = await API.getMe();
          
          document.getElementById('profile-name').textContent = user.display_name;
          document.getElementById('profile-username').textContent = user.username ? `@${user.username}` : '';
          
          // Setup avatar
          if (TG.webapp && TG.webapp.initDataUnsafe && TG.webapp.initDataUnsafe.user && TG.webapp.initDataUnsafe.user.photo_url) {
            avatarEl.innerHTML = `<img src="${TG.webapp.initDataUnsafe.user.photo_url}" alt="avatar">`;
          } else {
            avatarEl.textContent = user.display_name[0].toUpperCase();
          }

          nameInput.value = user.display_name;
          tagInput.value = user.brawl_stars_tag ? user.brawl_stars_tag.replace('#', '') : '';

          // Display status role
          if (user.is_admin) {
            document.getElementById('stat-status').textContent = 'Админ';
            document.getElementById('stat-status').style.color = 'var(--accent-orange)';
            
            // Show admin badge
            const ind = document.getElementById('admin-indicator');
            ind.classList.remove('hidden');
            ind.addEventListener('click', () => {
              App.navigate('admin/index.html');
            });
          } else {
            document.getElementById('stat-status').textContent = 'Игрок';
          }

          // Fetch leaderboard stats to find user's win count
          try {
            const leaderboard = await API.getLeaderboard(100);
            const userLeaderboardInfo = leaderboard.find(item => item.id === user.id);
            document.getElementById('stat-wins').textContent = userLeaderboardInfo ? userLeaderboardInfo.wins : 0;
          } catch (e) {
            document.getElementById('stat-wins').textContent = 0;
          }

          // Fetch active tournaments count for player
          try {
            const list = await API.getTournaments();
            // Count registered ones
            const registeredCount = list.filter(item => item.is_registered).length;
            document.getElementById('stat-tournaments').textContent = registeredCount;
          } catch (e) {
            document.getElementById('stat-tournaments').textContent = 0;
          }

        } catch (err) {
          App.toast(err.message, 'error');
        }
      };

      await loadProfile();

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        TG.haptic('medium');

        // Cleanup tag (uppercase, remove hash)
        let cleanedTag = tagInput.value.trim().toUpperCase().replace('#', '');
        let cleanName = nameInput.value.trim();

        if (!cleanedTag) {
          App.toast('Brawl Stars Tag не может быть пустым', 'error');
          return;
        }

        try {
          await API.updateProfile({
            brawl_stars_tag: cleanedTag,
            display_name: cleanName
          });
          App.toast('Профиль обновлен!', 'success');
          await loadProfile();
        } catch (err) {
          App.toast(err.message, 'error');
        }
      });
    });
  </script>
</body>
</html>
