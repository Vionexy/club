<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>История турниров</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header__inner">
      <div>
        <h1 class="header__title">📜 Архив</h1>
        <p class="header__subtitle">Прошедшие турниры</p>
      </div>
      <div id="admin-indicator" class="badge badge--draft hidden">Admin</div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container page animate-fade-in" style="padding-bottom:100px">
    <div class="page-title">
      <span>🏆</span> История турниров
    </div>

    <!-- History List -->
    <div id="history-list" class="stagger-children">
      <!-- Loading skeletons will be inserted here -->
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="bottom-nav__inner">
      <a href="index.html" class="bottom-nav__item" data-nav="tournaments">
        <svg viewBox="0 0 24 24">
          <path d="M19 5h-2V3c0-1.1-.9-2-2-2H9c-1.1 0-2 .9-2 2v2H5c-1.1 0-2 .9-2 2v13c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-6-2h2v2h-2V3zm-4 0h2v2H9V3zm10 17H5V7h14v13z"/>
        </svg>
        <span>Турниры</span>
      </a>
      <a href="leaderboard.html" class="bottom-nav__item" data-nav="leaderboard">
        <svg viewBox="0 0 24 24">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
        <span>Лидеры</span>
      </a>
      <a href="history.html" class="bottom-nav__item bottom-nav__item--active" data-nav="history">
        <svg viewBox="0 0 24 24">
          <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
        </svg>
        <span>История</span>
      </a>
      <a href="profile.html" class="bottom-nav__item" data-nav="profile">
        <svg viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
        <span>Профиль</span>
      </a>
    </div>
  </nav>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- App JS -->
  <script src="js/telegram.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      App.init({ page: 'history', activeNav: 'history' });

      const listContainer = document.getElementById('history-list');
      App.showSkeletons(listContainer, 3);

      try {
        // Check admin
        try {
          const adminCheck = await API.checkAdmin();
          if (adminCheck && adminCheck.is_admin) {
            const ind = document.getElementById('admin-indicator');
            ind.classList.remove('hidden');
            ind.addEventListener('click', () => {
              App.navigate('admin/index.html');
            });
          }
        } catch (e) {}

        const history = await API.getHistory();
        listContainer.innerHTML = '';

        if (history.length === 0) {
          App.showEmpty(
            listContainer,
            '📜',
            'Архив пуст',
            'Здесь будут отображаться завершенные турниры.'
          );
          return;
        }

        history.forEach(t => {
          const item = document.createElement('div');
          item.className = 'history-item animate-slide-up';
          item.addEventListener('click', () => {
            App.navigate('tournament.html', { id: t.id });
          });

          // Fetch winner from bracket if available
          // (Since we don't have direct winner info in Tournament model returned from GET /tournaments,
          // let's display a generic info card, or they can click to see details).
          // We can mention game mode, date, and participants.
          
          item.innerHTML = `
            <div class="history-item__trophy">🏆</div>
            <div class="history-item__info">
              <h4 class="history-item__title">${App.escapeHtml(t.title)}</h4>
              <div class="history-item__meta">
                <span>🎮 ${App.escapeHtml(t.game_mode)}</span> • 
                <span>📅 ${App.formatDate(t.start_date)}</span>
              </div>
            </div>
            <div class="badge badge--completed">Завершен</div>`;
          listContainer.appendChild(item);
        });

      } catch (err) {
        App.showError(listContainer, err.message, () => window.location.reload());
      }
    });
  </script>
</body>
</html>
